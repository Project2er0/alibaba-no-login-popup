<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>Ali Search Unlock</title>
    <style>
      body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; width: 260px; margin: 0; padding: 14px; color: #222; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      .row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; font-size: 13px; }
      .hint { font-size: 12px; color: #666; line-height: 1.4; margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
      .switch { position: relative; width: 38px; height: 22px; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; transition: .2s; cursor: pointer; }
      .slider::before { content: ""; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: .2s; }
      input:checked + .slider { background: #ff6a00; }
      input:checked + .slider::before { transform: translateX(16px); }
      button { margin-top: 6px; width: 100%; padding: 6px; border: 1px solid #ddd; background: #fafafa; border-radius: 6px; cursor: pointer; font-size: 12px; }
      button:hover { background: #f0f0f0; }
    </style>
  </head>
  <body>
    <h1>Ali Search Unlock</h1>
    <div class="row">
      <span>启用</span>
      <label class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </label>
    </div>
    <button id="clean">立即清理当前页面</button>
    <div class="hint">
      已对 *.alibaba.com / *.aliexpress.com 生效。如未关闭弹窗，请点击「立即清理」或刷新页面。
    </div>
    <script src="popup.js"></script>
  </body>
</html>
